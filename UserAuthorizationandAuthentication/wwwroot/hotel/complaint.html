<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaints & Support</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: var(--gold);
            --bg-dark: var(--bg-primary);
            --glass: var(--glass-bg);
            --glass-border: var(--glass-border);
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(212, 168, 83, 0.07) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(212, 168, 83, 0.07) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text-primary);
            font-family: 'Outfit', 'Inter', sans-serif;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--r);
            box-shadow: var(--shadow-md);
        }

        .type-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: rgba(0,0,0,0.2);
            padding: 6px;
            border-radius: 14px;
        }

        .type-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .type-btn.active {
            background: var(--gold);
            color: #000;
            box-shadow: 0 4px 15px rgba(212, 168, 83, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .form-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }

        .form-input:focus {
            border-color: var(--gold);
            background: rgba(0,0,0,0.5);
        }

        .booking-preview {
            background: var(--gold-dim);
            border: 1px dashed var(--gold);
            border-radius: 12px;
            padding: 15px;
            margin-top: 10px;
            display: none;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            font-size: 0.85rem;
        }

        .preview-item span {
            color: var(--text-secondary);
            display: block;
            margin-bottom: 2px;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .preview-item b {
            color: var(--gold);
        }

        .complaint-card {
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .complaint-card:hover {
            transform: translateY(-3px);
            border-color: var(--gold);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .status-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .status-Pending { background: rgba(245, 166, 35, 0.15); color: #F5A623; border: 1px solid rgba(245, 166, 35, 0.3); }
        .status-Resolved { background: rgba(62, 207, 160, 0.15); color: #3ECFA0; border: 1px solid rgba(62, 207, 160, 0.3); }
        .status-Rejected { background: rgba(240, 101, 101, 0.15); color: #F06565; border: 1px solid rgba(240, 101, 101, 0.3); }

        .btn-submit {
            background: var(--gold);
            color: #000;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(212, 168, 83, 0.4);
            background: #fff;
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #historySection {
            margin-top: 50px;
        }

        .tab-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .image-upload-area {
            border: 2px dashed var(--glass-border-light);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255,255,255,0.02);
        }

        .image-upload-area:hover {
            border-color: var(--gold);
            background: var(--gold-dim);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header" style="border-bottom: 1px solid var(--glass-border);">
            <a href="index.html" style="color: #fff;"><i class="fas fa-arrow-left"></i></a>
            <div class="header-title">Complaints & Support</div>
            <div style="width: 24px;"></div>
        </header>

        <div style="max-width: 800px; margin: 0 auto; padding: 25px;">
            
            <!-- Form Section -->
            <div class="glass-panel" style="padding: 30px;">
                <h2 style="margin-bottom: 20px; font-weight: 700;">Submit a Complaint</h2>
                
                <div class="type-toggle">
                    <button class="type-btn active" onclick="switchType('Hotel', this)">
                        <i class="fas fa-hotel"></i> Hotel
                    </button>
                    <button class="type-btn" onclick="switchType('Tour', this)">
                        <i class="fas fa-map-marked-alt"></i> Tour
                    </button>
                    <button class="type-btn" onclick="switchType('Airline', this)">
                        <i class="fas fa-plane"></i> Airline
                    </button>
                    <button class="type-btn" onclick="switchType('Service', this)">
                        <i class="fas fa-laptop"></i> Service
                    </button>
                </div>

                <form id="complaintForm">
                    <!-- Booking Selector (Only for Booking type) -->
                    <div class="form-group" id="bookingSelectorGroup">
                        <label>Select Booking</label>
                        <select class="form-input" id="bookingSelect" onchange="onBookingChange()">
                            <option value="">-- Choose a Booking --</option>
                        </select>
                        <div id="bookingPreview" class="booking-preview">
                            <div class="preview-grid">
                                <div class="preview-item">
                                    <span>Hotel</span>
                                    <b id="p-hotel">--</b>
                                </div>
                                <div class="preview-item">
                                    <span>City</span>
                                    <b id="p-city">--</b>
                                </div>
                                <div class="preview-item">
                                    <span>Dates</span>
                                    <b id="p-dates">--</b>
                                </div>
                                <div class="preview-item">
                                    <span>Room</span>
                                    <b id="p-room">--</b>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Subject</label>
                        <input type="text" class="form-input" id="subject" placeholder="What is the issue about?">
                    </div>

                    <div class="form-group">
                        <label>Message</label>
                        <textarea class="form-input" id="message" style="height: 150px; resize: none;" placeholder="Explain your problem in detail..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Attachments (Images)</label>
                        <div class="image-upload-area" onclick="document.getElementById('fileInput').click()">
                            <i class="fas fa-cloud-upload-alt fa-2x" style="color: var(--primary); margin-bottom: 10px;"></i>
                            <p id="fileLabel">Click to upload images</p>
                            <input type="file" id="fileInput" multiple hidden onchange="onFilesSelected()">
                        </div>
                        <div id="filePreviewList" style="display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap;"></div>
                    </div>

                    <button type="submit" class="btn-submit" id="submitBtn">
                        Submit Complaint
                    </button>
                </form>
            </div>

            <!-- History Section -->
            <div id="historySection">
                <div class="tab-header">
                    <h2 style="font-weight: 700;">My Complaint History</h2>
                    <button class="pill" onclick="loadComplaints()" title="Refresh">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>

                <div id="complaintsList">
                    <!-- History cards will load here -->
                    <div style="text-align: center; padding: 40px; color: #94a3b8;">
                        <i class="fas fa-circle-notch fa-spin fa-2x"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        let currentType = 'Hotel';
        let userBookings = [];
        let selectedFiles = [];
        let editingId = null;

        if (!Auth.isLoggedIn()) window.location.href = 'login.html';

        async function init() {
            try {
                await loadEligibleBookings();
            } catch (err) {
                console.error("Failed to load eligible bookings:", err);
            }
            try {
                await loadComplaints();
            } catch (err) {
                console.error("Failed to load complaints:", err);
                const container = document.getElementById('complaintsList');
                if (container) {
                    container.innerHTML = '<div style="text-align:center; padding:40px; color:#ef4444;">Failed to load history.</div>';
                }
            }
        }

        async function loadEligibleBookings() {
            if (currentType === 'Service') return;
            try {
                const res = await API.get('/user/complaints/bookings?type=' + currentType);
                const select = document.getElementById('bookingSelect');
                if (res && res.success && res.data) {
                    userBookings = res.data;
                    select.innerHTML = '<option value="">-- Choose a Booking --</option>' + 
                        userBookings.map(b => `<option value="${b.bookingId}">[${b.type}] #${b.bookingId} - ${b.providerName || b.hotelName}</option>`).join('');
                } else {
                    userBookings = [];
                    if (select) select.innerHTML = '<option value="">-- Choose a Booking --</option>';
                }
            } catch (err) {
                console.error("Error loading eligible bookings:", err);
                userBookings = [];
                const select = document.getElementById('bookingSelect');
                if (select) select.innerHTML = '<option value="">-- Choose a Booking --</option>';
            }
        }

        async function switchType(type, btn) {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const bookingGroup = document.getElementById('bookingSelectorGroup');
            if (type === 'Service') {
                bookingGroup.style.display = 'none';
            } else {
                bookingGroup.style.display = 'block';
                await loadEligibleBookings();
                document.getElementById('bookingPreview').style.display = 'none';
            }
        }

        function onBookingChange() {
            const id = document.getElementById('bookingSelect').value;
            const preview = document.getElementById('bookingPreview');
            if (!id) {
                preview.style.display = 'none';
                return;
            }
            
            const b = userBookings.find(x => x.bookingId == id);
            if (b) {
                document.getElementById('p-hotel').innerText = b.hotelName;
                document.getElementById('p-city').innerText = b.city;
                document.getElementById('p-dates').innerText = b.dates;
                document.getElementById('p-room').innerText = b.roomName;
                preview.style.display = 'block';
            }
        }

        function onFilesSelected() {
            const input = document.getElementById('fileInput');
            for(let file of input.files) {
                selectedFiles.push(file);
            }
            input.value = '';
            renderFilePreview();
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            renderFilePreview();
        }

        function renderFilePreview() {
            const previewList = document.getElementById('filePreviewList');
            const label = document.getElementById('fileLabel');
            
            if (selectedFiles.length > 0) {
                label.innerText = `${selectedFiles.length} file(s) selected`;
                previewList.innerHTML = selectedFiles.map((f, i) => `
                    <div style="background:rgba(255,255,255,0.1); padding:5px 10px; border-radius:8px; font-size:0.8rem; display:flex; align-items:center; gap:8px;">
                        <i class="fas fa-image"></i> ${f.name.substring(0, 15)}...
                        <i class="fas fa-times" style="color: #ef4444; cursor: pointer; margin-left: 5px;" onclick="removeFile(${i})"></i>
                    </div>
                `).join('');
            } else {
                label.innerText = 'Click to upload images';
                previewList.innerHTML = '';
            }
        }

        document.getElementById('complaintForm').onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const subject = document.getElementById('subject').value.trim();
            const message = document.getElementById('message').value.trim();
            const bookingId = document.getElementById('bookingSelect').value;

            if (!subject || !message) {
                alert('Please provide a subject and a message.');
                return;
            }

            if (currentType !== 'Service' && !bookingId) {
                alert('Please select a booking.');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = editingId ? '<i class="fas fa-spinner fa-spin"></i> Updating...' : '<i class="fas fa-spinner fa-spin"></i> Submitting...';

            const formData = new FormData();
            formData.append('ComplaintType', currentType);
            if (currentType !== 'Service') formData.append('BookingId', bookingId);
            formData.append('Subject', subject);
            formData.append('Message', message);
            
            selectedFiles.forEach(file => {
                formData.append('Attachments', file);
            });

            const url = editingId ? `/user/complaints/${editingId}` : '/user/complaints';
            const method = editingId ? 'PUT' : 'POST';

            const res = await API.request(url, { method: method, body: formData });
            if (res.success) {
                alert(editingId ? 'Complaint updated successfully!' : 'Complaint submitted successfully!');
                cancelEdit();
                loadComplaints();
            } else {
                alert(res.message);
            }

            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Submit Complaint';
        };

        async function loadComplaints() {
            const container = document.getElementById('complaintsList');
            if (!container) return;
            try {
                const res = await API.get('/user/complaints/mine');
                if (res && res.success && res.data) {
                    const list = res.data;
                    if (list.length === 0) {
                        container.innerHTML = '<div style="text-align:center; padding:40px; color:#94a3b8;">No complaints found.</div>';
                        return;
                    }
                    
                    container.innerHTML = list.map(c => {
                        const cStatus = c.status || c.Status || c.statue || c.Statue;
                        const cId = c.id || c.Id;
                        return `
                        <div class="glass-panel complaint-card">
                            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;" onclick="location.href='complaint-details.html?id=${cId}'">
                                <div>
                                    <div style="font-size:0.75rem; color:var(--gold); font-weight:700; text-transform:uppercase;">${c.complaintType || c.ComplaintType}</div>
                                    <h3 style="margin:5px 0;">${c.subject || c.Subject}</h3>
                                </div>
                                <span class="status-pill status-${cStatus}">${cStatus}</span>
                            </div>
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                                <div style="font-size:0.85rem; color:#94a3b8;">
                                    <i class="far fa-clock"></i> ${new Date(c.createdAt || c.CreatedAt).toLocaleDateString()}
                                </div>
                                <div style="display:flex; gap:10px;">
                                    ${cStatus === 'Pending' ? `
                                        <button class="pill" onclick="event.stopPropagation(); deleteComplaint(${cId}, this)" style="background:rgba(239, 68, 68, 0.1); color:#ef4444; border:none; padding:6px 12px; font-weight:600; font-size:0.75rem;">
                                            <i class="fas fa-trash-alt"></i> DELETE
                                        </button>
                                        <button class="pill" onclick="event.stopPropagation(); location.href='edit-complaint.html?id=${cId}'" style="background:rgba(255,255,255,0.1); color:#fff; border:none; padding:6px 12px; font-weight:600; font-size:0.75rem;">
                                            <i class="fas fa-edit"></i> EDIT
                                        </button>
                                    ` : ''}
                                    <button class="pill" onclick="event.stopPropagation(); location.href='complaint-details.html?id=${cId}'" style="background:var(--gold); color:#000; border:none; padding:6px 15px; font-weight:800; font-size:0.75rem;">
                                        VIEW <i class="fas fa-chevron-right" style="font-size:0.6rem; margin-left:5px;"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `; }).join('');
                } else {
                    container.innerHTML = '<div style="text-align:center; padding:40px; color:#94a3b8;">No complaints found.</div>';
                }
            } catch (err) {
                console.error("Error loading complaints:", err);
                container.innerHTML = `<div style="text-align:center; padding:40px; color:#ef4444;">Failed to load complaints.</div>`;
            }
        }

        async function deleteComplaint(id, btn) {
            if (!confirm('Are you sure you want to delete this complaint?')) return;
            
            const originalHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            const res = await API.delete(`/user/complaints/${id}`);
            if (res.success) {
                alert('Complaint deleted successfully.');
                loadComplaints();
            } else {
                alert(res.message);
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        }

        init();
    </script>
</body>
</html>
