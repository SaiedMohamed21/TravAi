<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trips - Travai Unified</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0f1d;
            --card-bg: #161e31;
            --primary: #6366f1;
            --accent: #10b981;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 50px;
        }

        /* Navbar */
        nav {
            background: rgba(22, 30, 49, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 10px; }

        /* Header */
        .page-header {
            padding: 60px 5% 40px;
            text-align: center;
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { color: var(--text-muted); font-size: 1.1rem; }

        /* Tabs */
        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            padding: 0 5%;
        }

        .tab-btn {
            padding: 12px 30px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 50px;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        /* Section Container */
        .section-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 5%;
        }

        .service-section { margin-bottom: 50px; }
        .section-title {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.4rem;
            margin-bottom: 25px;
            color: var(--primary-light);
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        /* Grid */
        .trips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        /* Card Styles */
        .trip-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.3s, border-color 0.3s;
            display: flex;
            flex-direction: column;
        }

        .trip-card:hover { transform: translateY(-5px); border-color: var(--primary); }

        .trip-img { width: 100%; height: 180px; object-fit: cover; background: #0f172a; }

        .trip-content { padding: 25px; flex-grow: 1; position: relative; }

        .badge {
            position: absolute;
            top: -15px;
            right: 20px;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .badge-upcoming { background: var(--primary); color: white; }
        .badge-past { background: #475569; color: white; }
        .badge-cancelled { background: var(--danger); color: white; }

        .trip-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 15px; color: white; }

        .info-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; color: var(--text-muted); font-size: 0.9rem; }
        .info-row i { width: 16px; color: var(--primary); }

        .price-tag { margin-top: 20px; font-size: 1.2rem; font-weight: 700; color: var(--accent); }

        .card-actions {
            padding: 20px 25px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            border: none;
        }

        .btn-outline { border: 1px solid var(--border); color: var(--text); background: transparent; }
        .btn-outline:hover { background: var(--border); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #4f46e5; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }

        /* Loading & Empty */
        .loader-container { text-align: center; padding: 40px; }
        .spinner { 
            width: 40px; height: 40px; border: 4px solid var(--border); 
            border-top: 4px solid var(--primary); border-radius: 50%; 
            animation: spin 1s linear infinite; margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); grid-column: 1 / -1; }
        .empty-state i { font-size: 3rem; margin-bottom: 15px; opacity: 0.3; }

        /* Authentication overlay */
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }

        @media (max-width: 600px) {
            .tabs-container { flex-direction: column; }
            .tab-btn { width: 100%; }
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 29, 0.7);
            backdrop-filter: blur(12px);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--card-bg);
            z-index: 10;
        }

        .modal-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.75rem;
            cursor: pointer;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
        }

        .modal-close:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .modal-body {
            padding: 30px;
        }

        /* Detail Elements */
        .details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 480px) {
            .details-grid {
                grid-template-columns: 1fr;
            }
        }

        .details-item label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .details-item .value {
            font-size: 1.05rem;
            font-weight: 500;
            color: white;
        }

        /* Boarding Pass Styles */
        .boarding-pass {
            background: #fff;
            color: #0f172a;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            position: relative;
        }

        .pass-header {
            background: #1e293b;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pass-body {
            padding: 25px;
        }

        .airport-code {
            font-size: 2.2rem;
            font-weight: 800;
            color: #1e293b;
            line-height: 1;
        }

        .airport-name {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 5px;
        }

        .pass-divider {
            border-top: 2px dashed #cbd5e1;
            margin: 20px 0;
            position: relative;
        }

        .pass-divider::before, .pass-divider::after {
            content: '';
            position: absolute;
            top: -10px;
            width: 20px;
            height: 20px;
            background: var(--card-bg);
            border-radius: 50%;
        }
        .pass-divider::before { left: -35px; }
        .pass-divider::after { right: -35px; }

        .pass-passenger {
            background: #f8fafc;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e2e8f0;
        }

        .pass-passenger img {
            width: 70px;
            height: 70px;
            border-radius: 8px;
            background: #fff;
        }

        /* Tour Participant details */
        .participant-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
        }

    </style>
</head>
<body>

    <div id="authOverlay">
        <i class="fas fa-lock" style="font-size: 4rem; color: var(--primary); margin-bottom: 20px;"></i>
        <h2>Authentication Required</h2>
        <p style="color: var(--text-muted); margin: 15px 0 30px;">Please login to view your trips.</p>
        <a href="/auth/login.html" class="btn-primary" style="padding: 12px 40px; border-radius: 50px; text-decoration: none;">Login Now</a>
    </div>

    <nav>
        <a href="index.html" class="logo">
            <i class="fas fa-route"></i> Travai Unified
        </a>
        <div id="userProfile" style="display: flex; align-items: center; gap: 15px;">
            <span id="userName" style="font-weight: 500;"></span>
            <a href="checkout.html" class="btn-outline" style="padding: 8px 15px; border-radius: 8px; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; color: var(--text);">
                <i class="fas fa-credit-card"></i> Checkout
            </a>
            <button onclick="logout()" class="btn-outline" style="padding: 8px 15px; border-radius: 8px;">Logout</button>
        </div>
    </nav>

    <div class="page-header">
        <h1>My Journeys</h1>
        <p class="subtitle">Manage your bookings and explore your travel history</p>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('upcoming')">Upcoming Trips</button>
        <button class="tab-btn" onclick="switchTab('past')">Past Journeys</button>
        <button class="tab-btn" onclick="switchTab('cancelled')">Cancelled</button>
        <button class="tab-btn" onclick="seedPastReviews()" style="background: rgba(16, 185, 129, 0.15); border-color: var(--accent); color: var(--accent);"><i class="fas fa-magic"></i> Seed Past Trips</button>
    </div>

    <div class="section-container">
        <!-- Hotels -->
        <div class="service-section">
            <h2 class="section-title"><i class="fas fa-hotel"></i> Hotels</h2>
            <div id="hotelsGrid" class="trips-grid">
                <!-- Data injected here -->
                <div class="loader-container"><div class="spinner"></div></div>
            </div>
        </div>

        <!-- Flights -->
        <div class="service-section">
            <h2 class="section-title"><i class="fas fa-plane"></i> Flights</h2>
            <div id="flightsGrid" class="trips-grid">
                <!-- Data injected here -->
                <div class="loader-container"><div class="spinner"></div></div>
            </div>
        </div>

        <!-- Tours -->
        <div class="service-section">
            <h2 class="section-title"><i class="fas fa-map-marked-alt"></i> Tours</h2>
            <div id="toursGrid" class="trips-grid">
                <!-- Data injected here -->
                <div class="loader-container"><div class="spinner"></div></div>
            </div>
        </div>
    </div>

    <!-- Booking Details Modal -->
    <div id="detailsModal" class="modal-overlay" onclick="closeModalOnOuterClick(event)">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Booking Details</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody" class="modal-body">
                <!-- Dynamic content will be injected here -->
            </div>
        </div>
    </div>

    <!-- Add Review Modal -->
    <div id="reviewModal" class="modal-overlay" onclick="closeReviewModalOnOuterClick(event)">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h2 id="reviewModalTitle" style="font-size: 1.5rem; font-weight: 700; color: white;">Write a Review</h2>
                <button class="modal-close" onclick="closeReviewModal()">&times;</button>
            </div>
            <div class="modal-body" style="color: #f1f5f9;">
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted);">Rating</label>
                    <div style="display: flex; gap: 10px; font-size: 2rem;">
                        <i class="far fa-star star-review" onclick="setReviewRating(1)" id="star-1" style="cursor: pointer; color: var(--text-muted);"></i>
                        <i class="far fa-star star-review" onclick="setReviewRating(2)" id="star-2" style="cursor: pointer; color: var(--text-muted);"></i>
                        <i class="far fa-star star-review" onclick="setReviewRating(3)" id="star-3" style="cursor: pointer; color: var(--text-muted);"></i>
                        <i class="far fa-star star-review" onclick="setReviewRating(4)" id="star-4" style="cursor: pointer; color: var(--text-muted);"></i>
                        <i class="far fa-star star-review" onclick="setReviewRating(5)" id="star-5" style="cursor: pointer; color: var(--text-muted);"></i>
                    </div>
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted);">Your Feedback</label>
                    <textarea id="reviewCommentInput" rows="4" placeholder="Share your experience..." style="width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 12px; color: white; font-family: inherit; font-size: 0.95rem; resize: vertical;"></textarea>
                </div>

                <div id="reviewMsgDiv" style="margin-bottom: 20px; font-weight: 600; font-size: 0.9rem; text-align: center;"></div>

                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <button class="btn btn-outline" onclick="closeReviewModal()" style="flex: 1;">Cancel</button>
                    <button id="deleteReviewBtn" class="btn btn-danger" onclick="deleteReviewForm()" style="flex: 1; display: none;">Delete Review</button>
                    <button id="submitReviewBtn" class="btn btn-primary" onclick="submitReviewForm()" style="flex: 1;">Submit Review</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'upcoming';
        const token = localStorage.getItem('token');
        let tripCache = { hotels: [], flights: [], tours: [] };

        function escapeJS(str) {
            if (!str) return '';
            return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, '\\n');
        }

        function getReviewButtonHtml(type, trip) {
            if (trip.hasReviewed) {
                return `<button onclick="openReviewModal('${type}', ${type === 'hotel' ? trip.hotelId : (type === 'tour' ? trip.tourId : trip.flightId)}, true, ${trip.reviewId}, ${trip.reviewRating}, '${escapeJS(trip.reviewComment || '')}')" class="btn btn-outline" style="flex: 1; min-width: 45%; border-color: var(--accent); color: var(--accent);"><i class="fas fa-edit"></i> Edit Review</button>`;
            } else if (trip.canReview) {
                return `<button onclick="openReviewModal('${type}', ${type === 'hotel' ? trip.hotelId : (type === 'tour' ? trip.tourId : trip.flightId)}, false)" class="btn btn-primary" style="flex: 1; min-width: 45%;">Write Review</button>`;
            }
            return '';
        }

        if (!token) {
            document.getElementById('authOverlay').style.display = 'flex';
        }

        async function fetchTrips() {
            setLoaders();
            
            // Fetch Hotels
            loadService('hotels', `/api/user/trips/hotels?tab=${currentTab}`, renderHotelCard);
            
            // Fetch Flights
            loadService('flights', `/api/airline/bookings/my-trips?tab=${currentTab}`, renderFlightCard);
            
            // Fetch Tours
            loadService('tours', `/api/tourguide/bookings/my-trips?tab=${currentTab}`, renderTourCard);
        }

        async function loadService(service, url, renderFn) {
            const grid = document.getElementById(`${service}Grid`);
            try {
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();
                
                if (result.success && result.data && result.data.length > 0) {
                    tripCache[service] = result.data;
                    grid.innerHTML = result.data.map(renderFn).join('');
                } else {
                    tripCache[service] = [];
                    grid.innerHTML = `<div class="empty-state"><i class="fas fa-calendar-times"></i><p>No ${currentTab} ${service} found.</p></div>`;
                }
            } catch (error) {
                grid.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Error loading ${service}.</p></div>`;
            }
        }

        function renderHotelCard(trip) {
            const now = new Date();
            const checkIn = new Date(trip.checkInDate);
            const checkOut = new Date(trip.checkOutDate);
            
            let cancelHtml = '';
            
            if (currentTab === 'cancelled') {
                cancelHtml = '';
            } else if (now < checkIn) {
                cancelHtml = trip.canCancel ? `<button class="btn btn-danger" onclick="cancelHotel(${trip.bookingId})">Cancel</button>` : '';
            } else if (now >= checkIn && now <= checkOut) {
                cancelHtml = `<div class="info-row" style="background: rgba(239, 68, 68, 0.1); padding: 5px 10px; border-radius: 8px; color: #fca5a5; font-size: 0.85rem; width: 100%; text-align: center;"><i class="fas fa-lock"></i> Stay in progress — cancellation is no longer available.</div>`;
            } else {
                cancelHtml = ''; // Past
            }

            return `
                <div class="trip-card">
                    <img src="${trip.imageUrl || 'https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=500'}" class="trip-img" alt="Hotel">
                    <div class="trip-content">
                        <span class="badge badge-${currentTab}">${trip.bookingStatus || 'Undefined'}</span>
                        <h3 class="trip-title">${trip.hotelName}</h3>
                        <div class="info-row"><i class="fas fa-bed"></i> ${trip.roomName}</div>
                        <div class="info-row"><i class="fas fa-calendar-alt"></i> ${formatDate(trip.checkInDate)} - ${formatDate(trip.checkOutDate)}</div>
                        <div class="price-tag">$${trip.totalPrice}</div>
                    </div>
                    <div class="card-actions" style="flex-wrap: wrap; gap: 10px;">
                        <button onclick="showHotelDetails(${trip.bookingId})" class="btn btn-outline" style="flex: 1; min-width: 45%;">View Details</button>
                        ${getReviewButtonHtml('hotel', trip)}
                        ${trip.canRebook ? `<a href="hotel/hotel-details.html?id=${trip.hotelId}" class="btn btn-primary" style="flex: 1; min-width: 45%;">Rebook</a>` : ''}
                        ${cancelHtml}
                    </div>
                </div>
            `;
        }

        function renderFlightCard(trip) {
            const now = new Date();
            const departure = new Date(trip.departureTime);
            const arrival = trip.arrivalTime ? new Date(trip.arrivalTime) : new Date(departure.getTime() + 4 * 60 * 60 * 1000); // approx 4h if missing
            
            let cancelHtml = '';
            
            if (currentTab === 'cancelled') {
                cancelHtml = '';
            } else if (now < departure) {
                cancelHtml = trip.canCancel ? `<button class="btn btn-danger" onclick="cancelFlight(${trip.id})">Cancel</button>` : '';
            } else if (now >= departure && now <= arrival) {
                cancelHtml = `<div class="info-row" style="background: rgba(239, 68, 68, 0.1); padding: 5px 10px; border-radius: 8px; color: #fca5a5; font-size: 0.85rem; width: 100%; text-align: center;"><i class="fas fa-lock"></i> Flight in progress — cancellation is no longer available.</div>`;
            } else {
                cancelHtml = ''; // Past
            }

            return `
                <div class="trip-card">
                    <div style="background: linear-gradient(135deg, #1e293b, #0f172a); height: 100px; display: flex; align-items: center; justify-content: center; font-size: 2rem;">✈️</div>
                    <div class="trip-content">
                        <span class="badge badge-${currentTab}">${trip.uiBadge}</span>
                        <h3 class="trip-title">${trip.airlineName} - ${trip.flightNumber}</h3>
                        <div class="info-row"><i class="fas fa-map-marker-alt"></i> ${trip.routeTitle}</div>
                        <div class="info-row"><i class="fas fa-clock"></i> Departure: ${formatDateTime(trip.departureTime)}</div>
                        <div class="info-row" style="background: rgba(99, 102, 241, 0.1); padding: 5px 10px; border-radius: 8px; width: fit-content;"><i class="fas fa-chair" style="color: var(--primary);"></i> <strong style="color: white; margin-left: 5px;">Class: ${trip.flightClass || 'Economy'}</strong></div>
                        <div class="info-row"><i class="fas fa-ticket-alt"></i> Boarding: ${trip.boardingTime}</div>
                        <div class="price-tag">$${trip.totalPrice}</div>
                    </div>
                    <div class="card-actions" style="flex-wrap: wrap; gap: 10px;">
                        <button onclick="showFlightTicket(${trip.id})" class="btn btn-outline" style="flex: 1; min-width: 45%;">E-Ticket</button>
                        ${getReviewButtonHtml('flight', trip)}
                        ${cancelHtml}
                    </div>
                </div>
            `;
        }

        function renderTourCard(trip) {
            const statusVal = trip.status || 'Pending';
            const paymentVal = trip.paymentStatus || 'Pending';
            const tourTimeVal = trip.tourTime ? (trip.tourTime.includes(':') ? trip.tourTime.substring(0, 5) : trip.tourTime) : '00:00';
            
            const now = new Date();
            const tourDateTimeStr = trip.tourDate.split('T')[0] + 'T' + tourTimeVal + ':00';
            const tourStart = new Date(tourDateTimeStr);
            const msBeforeStart = tourStart.getTime() - now.getTime();
            const hoursBeforeStart = msBeforeStart / (1000 * 60 * 60);

            let cancelHtml = '';
            
            if (currentTab === 'cancelled') {
                cancelHtml = '';
            } else if (hoursBeforeStart > 24) {
                cancelHtml = trip.canCancel ? `<button class="btn btn-danger" onclick="cancelTour(${trip.id})">Cancel</button>` : '';
            } else if (hoursBeforeStart > 0 && hoursBeforeStart <= 24) {
                cancelHtml = `<div class="info-row" style="background: rgba(239, 68, 68, 0.1); padding: 5px 10px; border-radius: 8px; color: #fca5a5; font-size: 0.85rem; width: 100%; text-align: center;"><i class="fas fa-lock"></i> Cancellation closed — less than 24 hours before start.</div>`;
            } else {
                cancelHtml = ''; // Past/In Progress
            }

            return `
                <div class="trip-card">
                    <img src="${trip.primaryImageUrl || 'https://images.unsplash.com/photo-1503174971373-b1f69850bbd6?auto=format&fit=crop&w=500'}" class="trip-img" alt="Tour">

                        <h3 class="trip-title">${trip.tourTitle || 'Unknown Tour'}</h3>
                        <div class="info-row"><i class="fas fa-calendar-day"></i> ${formatDate(trip.tourDate)} at ${tourTimeVal}</div>
                        <div class="info-row"><i class="fas fa-users"></i> ${trip.participantsCount || 0} Participants</div>
                        <div class="info-row" style="margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap;">
                            <span style="font-size: 0.8rem; padding: 4px 10px; border-radius: 6px; background: rgba(99, 102, 241, 0.15); color: #a5b4fc; font-weight: 600; display: inline-flex; align-items: center; gap: 5px;">
                                <i class="fas fa-info-circle" style="color: #a5b4fc; width: auto; margin-right: 0;"></i> ${statusVal}
                            </span>
                            <span style="font-size: 0.8rem; padding: 4px 10px; border-radius: 6px; background: ${paymentVal === 'Completed' || paymentVal === 'Paid' ? 'rgba(16, 185, 129, 0.15)' : 'rgba(239, 68, 68, 0.15)'}; color: ${paymentVal === 'Completed' || paymentVal === 'Paid' ? '#34d399' : '#f87171'}; font-weight: 600; display: inline-flex; align-items: center; gap: 5px;">
                                <i class="fas fa-credit-card" style="color: inherit; width: auto; margin-right: 0;"></i> ${paymentVal}
                            </span>
                        </div>
                        <div class="price-tag">$${trip.totalPrice || 0}</div>

                    <div class="card-actions" style="flex-wrap: wrap; gap: 10px;">
                        <button onclick="showTourDetails(${trip.id})" class="btn btn-outline" style="flex: 1; min-width: 45%;">Details</button>
                        ${getReviewButtonHtml('tour', trip)}
                        ${cancelHtml}
                    </div>
                </div>
            `;
        }

        // Review Modal Logic
        let reviewType = '';
        let reviewTargetId = 0;
        let reviewRating = 0;
        let isEditMode = false;
        let editingReviewId = null;

        function openReviewModal(type, targetId, isEdit = false, reviewId = null, rating = 0, comment = '') {
            reviewType = type;
            reviewTargetId = targetId;
            isEditMode = isEdit;
            editingReviewId = reviewId;
            reviewRating = rating;

            document.getElementById('reviewModalTitle').innerText = 
                isEdit ? (type === 'hotel' ? 'Edit Hotel Review' : type === 'tour' ? 'Edit Tour Review' : 'Edit Flight Review')
                       : (type === 'hotel' ? 'Write Hotel Review' : type === 'tour' ? 'Write Tour Review' : 'Write Flight Review');

            document.getElementById('reviewCommentInput').value = comment;
            document.getElementById('reviewMsgDiv').innerText = '';
            setReviewRating(rating);
            
            // Toggle Delete button and submit button text
            document.getElementById('deleteReviewBtn').style.display = isEdit ? 'block' : 'none';
            document.getElementById('submitReviewBtn').innerText = isEdit ? 'Save Changes' : 'Submit Review';

            document.getElementById('reviewModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeReviewModal() {
            document.getElementById('reviewModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function closeReviewModalOnOuterClick(event) {
            if (event.target.id === 'reviewModal') {
                closeReviewModal();
            }
        }

        function setReviewRating(rating) {
            reviewRating = rating;
            for (let i = 1; i <= 5; i++) {
                const star = document.getElementById(`star-${i}`);
                if (i <= rating) {
                    star.className = 'fas fa-star star-review';
                    star.style.color = '#fbbf24';
                } else {
                    star.className = 'far fa-star star-review';
                    star.style.color = 'var(--text-muted)';
                }
            }
        }

        async function submitReviewForm() {
            const comment = document.getElementById('reviewCommentInput').value.trim();
            const msgDiv = document.getElementById('reviewMsgDiv');

            if (reviewRating === 0) {
                msgDiv.style.color = '#ef4444';
                msgDiv.innerText = 'Please select a rating.';
                return;
            }

            msgDiv.style.color = 'var(--text-muted)';
            msgDiv.innerText = isEditMode ? 'Updating review...' : 'Submitting review...';

            let url = '';
            let method = isEditMode ? 'PUT' : 'POST';
            let bodyObj = {};

            if (reviewType === 'hotel') {
                url = isEditMode ? `/api/PublicHotels/reviews/${editingReviewId}` : '/api/PublicHotels/reviews';
                bodyObj = isEditMode ? { rating: reviewRating, comment: comment } : { hotelId: reviewTargetId, rating: reviewRating, comment: comment };
            } else if (reviewType === 'tour') {
                url = isEditMode ? `/api/tourguide/bookings/reviews/${editingReviewId}` : '/api/tourguide/bookings/reviews';
                bodyObj = isEditMode ? { rating: reviewRating, comment: comment } : { tourId: reviewTargetId, rating: reviewRating, comment: comment };
            } else if (reviewType === 'flight') {
                url = isEditMode ? `/api/airline/reviews/${editingReviewId}` : '/api/airline/reviews';
                bodyObj = isEditMode ? { rating: reviewRating, comment: comment } : { flightId: reviewTargetId, rating: reviewRating, comment: comment };
            }

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(bodyObj)
                });
                const result = await res.json();
                if (res.ok && (result.success || result.data || result.id || result.message === "Review added successfully" || result.message === "Review updated successfully")) {
                    msgDiv.style.color = '#10b981';
                    msgDiv.innerText = isEditMode ? 'Review updated successfully!' : 'Review submitted successfully!';
                    setTimeout(() => {
                        closeReviewModal();
                        fetchTrips(); // Reload lists
                    }, 1500);
                } else {
                    msgDiv.style.color = '#ef4444';
                    msgDiv.innerText = result.message || 'Failed to submit review.';
                }
            } catch (e) {
                msgDiv.style.color = '#ef4444';
                msgDiv.innerText = 'Error submitting review: ' + e.message;
            }
        }

        async function deleteReviewForm() {
            if (!confirm('Are you sure you want to delete this review?')) return;

            const msgDiv = document.getElementById('reviewMsgDiv');
            msgDiv.style.color = 'var(--text-muted)';
            msgDiv.innerText = 'Deleting review...';

            let url = '';
            if (reviewType === 'hotel') {
                url = `/api/PublicHotels/reviews/${editingReviewId}`;
            } else if (reviewType === 'tour') {
                url = `/api/tourguide/bookings/reviews/${editingReviewId}`;
            } else if (reviewType === 'flight') {
                url = `/api/airline/reviews/${editingReviewId}`;
            }

            try {
                const res = await fetch(url, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                const result = await res.json();
                if (res.ok && (result.success || result.data || result.message === "Review deleted successfully" || result.message === "Review deleted successfully.")) {
                    msgDiv.style.color = '#10b981';
                    msgDiv.innerText = 'Review deleted successfully!';
                    setTimeout(() => {
                        closeReviewModal();
                        fetchTrips(); // Reload lists
                    }, 1500);
                } else {
                    msgDiv.style.color = '#ef4444';
                    msgDiv.innerText = result.message || 'Failed to delete review.';
                }
            } catch (e) {
                msgDiv.style.color = '#ef4444';
                msgDiv.innerText = 'Error deleting review: ' + e.message;
            }
        }

        async function seedPastReviews() {
            try {
                const res = await fetch('/api/tourguide/bookings/seed-past-reviews', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await res.json();
                if (res.ok && result.success) {
                    alert('Successfully seeded 3 past journeys for review!');
                    fetchTrips();
                } else {
                    alert('Failed to seed trips: ' + (result.message || 'Unknown error'));
                }
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        // Initialize
        if (token) fetchTrips();

    </script>

</body>
