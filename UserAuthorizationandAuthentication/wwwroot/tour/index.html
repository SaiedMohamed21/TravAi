<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TourGuide Catalog - Travai</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --primary: #6366f1;
            --primary-light: #818cf8;
            --accent: #10b981;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(139, 92, 246, 0.15) 0%, transparent 40%);
        }

        /* Navbar */
        nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { 
            font-size: 1.5rem; 
            font-weight: 700; 
            color: var(--primary-light); 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-link {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
            font-size: 0.95rem;
        }

        .nav-link:hover {
            color: var(--primary-light);
        }

        .container {
            flex-grow: 1;
            width: 100%;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Search & Filter Panel */
        .filter-panel {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 40px;
            display: flex;
            gap: 20px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .search-group {
            flex-grow: 1;
            position: relative;
        }

        .search-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-group input {
            width: 100%;
            padding: 12px 12px 12px 45px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-group input:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
        }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.95rem;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }

        .btn-success {
            background: var(--accent);
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        /* Tour Grid */
        .tours-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .tour-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .tour-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary-light);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.15);
        }

        .tour-img {
            height: 200px;
            width: 100%;
            object-fit: cover;
            background-color: rgba(255, 255, 255, 0.02);
        }

        .tour-img-placeholder {
            height: 200px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
            font-size: 3rem;
            color: var(--text-muted);
        }

        .tour-body {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .tour-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text);
        }

        .tour-guide {
            font-size: 0.85rem;
            color: var(--primary-light);
            margin-bottom: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tour-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .tour-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--glass-border);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tour-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .tour-price {
            display: flex;
            flex-direction: column;
        }

        .price-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .price-amount {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
        }

        /* Loading Spinner */
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--glass-border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 60px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Alert Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.75);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #1e293b;
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 35px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: scaleIn 0.3s ease-out;
        }

        .modal-icon {
            font-size: 3.5rem;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .modal-text {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
        }

        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="../index.html" class="logo">
            <i class="fas fa-route"></i> Travai Unified
        </a>
        <div class="nav-links">
            <a href="../my-trips.html" class="nav-link"><i class="fas fa-suitcase"></i> My Trips</a>
            <a href="../checkout.html" class="nav-link"><i class="fas fa-shopping-cart"></i> Cart</a>
        </div>
    </nav>

    <div class="container">
        <header>
            <h1>Discover Global Adventures</h1>
            <p class="subtitle">Book immersive guided tours led by certified local experts.</p>
        </header>

        <!-- Search panel -->
        <div class="filter-panel">
            <div class="search-group">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search tours by title or destination..." oninput="filterTours()">
            </div>
            <button class="btn btn-primary" onclick="loadTours()">
                <i class="fas fa-sync"></i> Refresh
            </button>
        </div>

        <!-- Tour Grid -->
        <div id="loader" class="spinner"></div>
        <div id="toursGrid" class="tours-grid" style="display: none;"></div>
    </div>

    <!-- Booking Confirmation Modal -->
    <div class="modal-overlay" id="successModal">
        <div class="modal-content">
            <div class="modal-icon">🎉</div>
            <div class="modal-title" id="modalTitle">Tour Reserved!</div>
            <div class="modal-text" id="modalText">Your reservation was successfully created and is currently pending. Please proceed to payment within 1 hour.</div>
            <div class="modal-buttons">
                <a href="../checkout.html" class="btn btn-success" style="flex: 1;">Go to Checkout</a>
                <button class="btn btn-secondary" onclick="closeModal()" style="flex: 1; background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--glass-border);">Close</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '../auth/login.html';
        }

        let allTours = [];

        async function loadTours() {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('toursGrid').style.display = 'none';

            try {
                // Fetch tours using the public cards endpoint
                const response = await fetch('/api/tours/cards?PageSize=50', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const result = await response.json();
                
                // Determine structure: GET /api/tourguide/tours returns { tours, totalCount }
                if (result.tours) {
                    allTours = result.tours;
                } else if (Array.isArray(result)) {
                    allTours = result;
                } else if (result.data) {
                    allTours = result.data;
                } else {
                    allTours = [];
                }

                renderTours(allTours);
            } catch (err) {
                console.error(err);
                document.getElementById('toursGrid').innerHTML = '<p class="subtitle" style="grid-column: 1/-1; text-align: center;">Error loading tours catalog.</p>';
            } finally {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('toursGrid').style.display = 'grid';
            }
        }

        function renderTours(tours) {
            const grid = document.getElementById('toursGrid');
            if (tours.length === 0) {
                grid.innerHTML = '<p class="subtitle" style="grid-column: 1/-1; text-align: center;">No tours available at the moment.</p>';
                return;
            }

            grid.innerHTML = tours.map(t => {
                const img = t.imageUrl || (t.images && t.images.length > 0 ? t.images[0].imageUrl : null);
                const rating = t.rating || 5.0;
                const price = t.basePriceUsd || t.price || 0;
                const currency = t.currency || 'USD';
                
                return `
                    <div class="tour-card">
                        ${img ? `<img src="${img}" class="tour-img" alt="${t.tourTitle || t.title}">` 
                             : `<div class="tour-img-placeholder"><i class="fas fa-map-marked-alt"></i></div>`}
                        <div class="tour-body">
                            <div class="tour-title">${t.tourTitle || t.title}</div>
                            <div class="tour-guide">
                                <i class="fas fa-user-tie"></i> Guide: ${t.tourGuideName || t.guideName || 'Certified Expert'}
                            </div>
                            <div class="tour-desc">
                                ${t.tourDescription || t.description || 'Join us for a unique, unforgettable experience exploring must-see sights and hidden gems.'}
                            </div>
                            <div class="tour-meta">
                                <div class="meta-item"><i class="fas fa-map-marker-alt"></i> ${t.city || 'Scenic Location'}</div>
                                <div class="meta-item"><i class="fas fa-star" style="color: #fbbf24;"></i> ${rating.toFixed(1)} (${t.reviewsCount || t.numberOfReviews || 0})</div>
                            </div>
                            <div class="tour-footer">
                                <div class="tour-price">
                                    <span class="price-label">Price per person</span>
                                    <span class="price-amount">${currency} $${price.toFixed(2)}</span>
                                </div>
                                <button class="btn btn-primary" onclick="bookTour(${t.id})">Book Tour</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterTours() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allTours.filter(t => {
                const title = (t.tourTitle || t.title || '').toLowerCase();
                const city = (t.city || '').toLowerCase();
                const desc = (t.tourDescription || t.description || '').toLowerCase();
                return title.includes(query) || city.includes(query) || desc.includes(query);
            });
            renderTours(filtered);
        }

        async function bookTour(tourId) {
            try {
                // Show loader or disable button
                const response = await fetch(`/api/tourguide/bookings/tour/${tourId}`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    }
                });

                if (response.ok) {
                    showModal('Tour Reserved!', 'Your tour reservation is created successfully and is currently Pending. Please complete your payment from checkout.');
                } else {
                    const err = await response.json();
                    alert(err.message || 'Failed to create tour booking.');
                }
            } catch (err) {
                console.error(err);
                alert('Network connection error.');
            }
        }

        function showModal(title, text) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = text;
            document.getElementById('successModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('successModal').style.display = 'none';
        }

        window.onload = loadTours;
    </script>
</body>
</html>
