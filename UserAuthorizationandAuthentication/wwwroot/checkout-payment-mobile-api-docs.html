<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout & Payment API Docs - TravAi</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #151f32;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --gold: #6366f1; /* Changed style brand to TravAi Indigo */
            --accent-green: #10b981;
            --border: rgba(255, 255, 255, 0.08);
            --method-get: #38bdf8;
            --method-post: #34d399;
            --method-put: #fbbf24;
            --method-delete: #f87171;
            --method-guide: #a78bfa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 380px;
            background: #0f172a;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .sidebar-header {
            padding: 24px 24px 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            margin: 0;
            color: var(--text-main);
            font-size: 1.35rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-header h1 i {
            color: var(--gold);
        }

        .search-container {
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 10px 12px 10px 38px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-container input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
        }

        .search-container i {
            position: absolute;
            left: 36px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .endpoints-list {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        .category-title {
            padding: 20px 24px 8px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
        }

        .endpoint-link {
            padding: 10px 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .endpoint-link:hover, .endpoint-link.active {
            background: rgba(255, 255, 255, 0.04);
            border-left-color: var(--gold);
        }

        .method-badge {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 3px 6px;
            border-radius: 4px;
            min-width: 50px;
            text-align: center;
            text-transform: uppercase;
        }

        .method-GET { background: rgba(56, 189, 248, 0.15); color: var(--method-get); }
        .method-POST { background: rgba(52, 211, 153, 0.15); color: var(--method-post); }
        .method-PUT { background: rgba(251, 191, 36, 0.15); color: var(--method-put); }
        .method-DELETE { background: rgba(248, 113, 113, 0.15); color: var(--method-delete); }
        .method-GUIDE { background: rgba(167, 139, 250, 0.15); color: var(--method-guide); }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 35px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .url-box {
            background: #0b0f19;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-family: monospace;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            word-break: break-all;
        }

        h2 { color: var(--text-main); font-size: 1.8rem; margin-top: 0; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 15px;}
        h3 { font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-top: 35px; color: #cbd5e1; font-weight: 600;}

        pre {
            background: #0a0e17;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid var(--border);
            color: #a5b4fc;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            margin: 15px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 0.9rem;
        }

        th, td {
            text-align: left;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            background: rgba(0, 0, 0, 0.15);
        }

        .empty-state {
            text-align: center;
            padding: 120px 50px;
            color: var(--text-muted);
        }

        .hl-req { color: #fca5a5; font-weight: 600; }
        .hl-res { color: #34d399; font-weight: 600; }
        .hl-guide { color: #c084fc; font-weight: 600; }

        code {
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #cbd5e1;
        }

        .alert-box {
            background: rgba(99, 102, 241, 0.08);
            border-left: 4px solid var(--gold);
            padding: 15px 20px;
            border-radius: 0 8px 8px 0;
            margin: 20px 0;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .alert-box.warning {
            background: rgba(239, 68, 68, 0.08);
            border-left-color: var(--method-delete);
        }
        
        .alert-box.success {
            background: rgba(16, 185, 129, 0.08);
            border-left-color: var(--accent-green);
        }

        ul, ol {
            margin: 15px 0 15px 25px;
            line-height: 1.6;
        }

        li {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h1><i class="fas fa-wallet"></i> TravAi Checkout</h1>
            <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 6px;">Unified Checkout & Payment Specs</p>
        </div>
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchSidebar" placeholder="Search categories or endpoints..." oninput="filterSidebar()">
        </div>
        <div class="endpoints-list" id="sidebarList">
            <!-- Rendered Dynamically -->
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">
        <div class="empty-state">
            <i class="fas fa-receipt fa-4x" style="color: var(--gold); margin-bottom: 25px; opacity: 0.6;"></i>
            <h2 style="color: #fff; margin-bottom: 10px;">TravAi Checkout & Payment Specs</h2>
            <p style="font-size: 1.1rem; max-width: 600px; margin: 0 auto; line-height: 1.6;">Select a documentation category or API endpoint from the sidebar to view detailed parameters, payload structures, Flutter templates, and confirmation states.</p>
        </div>
    </div>

    <script>
        const apiData = [
            {
                category: "1. Integration Overview",
                endpoints: [
                    {
                        title: "Workflow Overview", method: "GUIDE", url: "Overview",
                        desc: "Understand the end-to-end user checkout experience across different travel domains (Flights, Hotels, Tours).",
                        isGuide: true,
                        content: `
                            <div class="alert-box">
                                <strong>System Goal:</strong> Enable users to secure flights, hotel rooms, and local tours under a unified checkout cart, handling dynamic seat locks, safety passenger records, and payment processing securely via Stripe.
                            </div>
                            <h3>Core Lifecycle Workflow</h3>
                            <ol>
                                <li><strong>Pre-booking Phase</strong>: Users search and book flights (Airline), room options (Hotel), or tour guide plans (Tour). These reservations are written to the database with a <code>Pending</code> reservation state and <code>Pending</code> payment status.</li>
                                <li><strong>Cart Expiration Constraints</strong>: Unpaid inventory blocks seats or rooms. Strict expiry windows are enforced:
                                    <ul>
                                        <li><strong>Airline flight booking</strong>: Expires and is deleted after <strong>10 minutes</strong>.</li>
                                        <li><strong>Hotel stay booking</strong>: Expires and is deleted after <strong>60 minutes</strong>.</li>
                                        <li><strong>Guided tour booking</strong>: Expires and is deleted after <strong>60 minutes</strong>.</li>
                                    </ul>
                                </li>
                                <li><strong>Passenger Identification</strong>: Flight reservations require passenger details (First Name, Last Name, Date of Birth, Gender, Passport Number, and Passport Expiry Date) to change state from <code>Incomplete</code> to <code>Complete</code> before they become ready for payment.</li>
                                <li><strong>Unified Transaction Processing</strong>: Users load the unified checkout list, select ready items, and request a Stripe payment session.</li>
                                <li><strong>Stripe Redirection</strong>: The user completes their transaction inside a Stripe hosted card form, redirecting back to the app success page or fallback cancelling screen.</li>
                                <li><strong>State Synchronization</strong>: The backend processes local transactions to mark items as <code>Paid</code> / <code>Confirmed</code> using payment callbacks and Stripe webhook callbacks.</li>
                            </ol>
                        `
                    }
                ]
            },
            {
                category: "2. Authentication Setup",
                endpoints: [
                    {
                        title: "Login Endpoint", method: "POST", url: "/api/Users/login",
                        desc: "Authenticates client credentials and returns JWT bearer token.",
                        requestParams: null,
                        requestBody: JSON.stringify({
                            email: "passenger@travai.com",
                            password: "SecurePassword123"
                        }, null, 2),
                        response: JSON.stringify({
                            success: true,
                            message: "Login successful",
                            data: {
                                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI0Iiwi...",
                                userId: 4,
                                userName: "passenger123",
                                role: "User"
                            }
                        }, null, 2),
                        notes: `
                            <h3>Secure Token Management</h3>
                            <p>Once the bearer token is received, the client must store it securely and attach it to the header of all checkout calls.</p>
                            <ul>
                                <li><strong>Flutter Secure Storage</strong>: Use the <code>flutter_secure_storage</code> package to store the token in the device keychain (iOS) or keystore (Android).</li>
                            </ul>
                            <h3>Header Construction Template</h3>
                            <pre><code>{
  "Authorization": "Bearer \${storedToken}",
  "Content-Type": "application/json"
}</code></pre>
                        `
                    },
                    {
                        title: "Register Endpoint", method: "POST", url: "/api/Users/register",
                        desc: "Create a new user account profile.",
                        requestParams: null,
                        requestBody: JSON.stringify({
                            name: "John Doe",
                            userName: "johndoe",
                            email: "passenger@travai.com",
                            password: "SecurePassword123",
                            phoneNumber: "+123456789",
                            passportNumber: "A000111222",
                            nationality: "Egyptian",
                            dateOfBirth: "1994-06-15",
                            gender: "Male"
                        }, null, 2),
                        response: JSON.stringify({
                            success: true,
                            message: "Registration successful"
                        }, null, 2)
                    }
                ]
            },
            {
                category: "3. Booking Creation APIs",
                endpoints: [
                    {
                        title: "Book Flight", method: "POST", url: "/api/airline/bookings",
                        desc: "Creates a flight reservation. A seat lock is initiated, reserving seats for 10 minutes.",
                        requestParams: null,
                        requestBody: JSON.stringify({
                            flightId: 12,
                            numberOfSeats: 2,
                            companionIds: [5, 6]
                        }, null, 2),
                        response: JSON.stringify({
                            success: true,
                            message: "Flight booked successfully.",
                            data: {
                                id: 1045,
                                flightId: 12,
                                numberOfSeats: 2,
                                totalPrice: 560.00,
                                bookingDate: "2026-06-10T19:40:00Z",
                                status: "Pending",
                                paymentStatus: "Pending",
                                passengerDetailsStatus: "Incomplete"
                            }
                        }, null, 2),
                        notes: `
                            <h3>Database Record Generation</h3>
                            <ul>
                                <li><strong>Booking Status</strong>: Created as <code>Pending</code>.</li>
                                <li><strong>Payment Status</strong>: Set as <code>Pending</code>.</li>
                                <li><strong>Passenger Status</strong>: Set as <code>Incomplete</code>. Creates placeholder passenger records.</li>
                                <li><strong>Seat Lock</strong>: The flight availability count is reduced by <code>numberOfSeats</code>.</li>
                                <li><strong>Timer</strong>: Booking is canceled and deleted if unpaid after 10 minutes.</li>
                            </ul>
                        `
                    },
                    {
                        title: "Book Hotel Room", method: "POST", url: "/api/HotelBookings",
                        desc: "Book hotel rooms for check-in/check-out dates. Reservation is locked for 60 minutes.",
                        requestParams: null,
                        requestBody: JSON.stringify({
                            hotelId: 3,
                            checkInDate: "2026-07-01T14:00:00Z",
                            checkOutDate: "2026-07-05T12:00:00Z",
                            rooms: [
                                { roomId: 42, mealPlan: "HB" }
                            ]
                        }, null, 2),
                        response: JSON.stringify({
                            success: true,
                            message: "Booking created successfully.",
                            data: {
                                id: 88,
                                userId: 4,
                                hotelId: 3,
                                checkInDate: "2026-07-01T14:00:00Z",
                                checkOutDate: "2026-07-05T12:00:00Z",
                                totalRooms: 1,
                                totalPrice: 480.00,
                                paymentStatus: "Pending",
                                status: "Pending",
                                createdAt: "2026-06-10T19:40:00Z"
                            }
                        }, null, 2),
                        notes: `
                            <h3>Database Record Generation</h3>
                            <ul>
                                <li><strong>Booking Status</strong>: Initialized to <code>Pending</code> (maps to 0).</li>
                                <li><strong>Payment Status</strong>: Initialized to <code>Pending</code> (maps to 0).</li>
                                <li><strong>Timer</strong>: Reservation is canceled and deleted if unpaid after 60 minutes.</li>
                            </ul>
                        `
                    },
                    {
                        title: "Book Guided Tour", method: "POST", url: "/api/tourguide/bookings/tour/{tourId}",
                        desc: "Book a guided tour card. Reservation is locked for 60 minutes.",
                        requestParams: [
                            { name: "tourId", type: "Path", desc: "Target tour guide card ID" }
                        ],
                        requestBody: null,
                        response: JSON.stringify({
                            id: 76,
                            userId: 4,
                            tourId: 8,
                            tourGuideId: 1,
                            tourDate: "2026-06-25T00:00:00Z",
                            participantsCount: 1,
                            totalPrice: 120.00,
                            currency: "USD",
                            paymentStatus: "Pending",
                            status: "Pending",
                            createdAt: "2026-06-10T19:40:00Z"
                        }, null, 2),
                        notes: `
                            <h3>Database Record Generation</h3>
                            <ul>
                                <li><strong>Booking Status</strong>: Set as <code>Pending</code>.</li>
                                <li><strong>Payment Status</strong>: Set as <code>Pending</code>.</li>
                                <li><strong>Timer</strong>: Reservation is canceled and deleted if unpaid after 60 minutes.</li>
                            </ul>
                        `
                    }
                ]
            },
            {
                category: "4. Airline Passenger Readiness",
                endpoints: [
                    {
                        title: "Submit Passenger Details", method: "POST", url: "/api/airline/bookings/{bookingId}/passenger-details",
                        desc: "Submit passenger details for all reserved seats. Complete passenger records are required before payment.",
                        requestParams: [
                            { name: "bookingId", type: "Path", desc: "Airline booking ID" }
                        ],
                        requestBody: JSON.stringify({
                            passengers: [
                                {
                                    id: 1201, // Optional: pass passenger id if updating existing record
                                    firstName: "John",
                                    lastName: "Doe",
                                    dateOfBirth: "1994-06-15",
                                    gender: "Male",
                                    passportNumber: "A0001112",
                                    passportExpiryDate: "2031-12-01",
                                    passengerType: "Adult",
                                    ageType: "Adult"
                                }
                            ]
                        }, null, 2),
                        response: JSON.stringify({
                            success: true,
                            message: "Passenger details saved successfully."
                        }, null, 2),
                        notes: `
                            <h3>Readiness Criteria</h3>
                            <p>To prepare an airline booking for payment, the count of valid passenger records submitted must equal the reserved <code>NumberOfSeats</code>. If a placeholder account holder profile remains (marked with <code>lastName: "(Account Holder)"</code>), validation will fail.</p>
                            <div class="alert-box">
                                <strong>Required Validation Fields (6-Field Rule):</strong><br>
                                <code>firstName</code> (non-empty), <code>lastName</code> (non-empty, not '(Account Holder)'), <code>passportNumber</code> (non-empty), <code>dateOfBirth</code> (valid date), <code>gender</code> (non-empty), and <code>passportExpiryDate</code> (valid date).
                            </div>
                        `
                    },
                    {
                        title: "Get Companions Lookup", method: "GET", url: "/api/airline/companions",
                        desc: "Retrieve the user's companion list to auto-fill details on passenger forms.",
                        requestParams: null,
                        requestBody: null,
                        response: JSON.stringify({
                            success: true,
                            data: [
                                {
                                    id: 5,
                                    firstName: "Jane",
                                    lastName: "Doe",
                                    ageType: "Adult",
                                    passportNumber: "P9988221",
                                    nationality: "Egyptian",
                                    profilePic: "https://example.com/pic.png",
                                    passportImage: "https://example.com/passport.png",
                                    dateOfBirth: "1996-08-20T00:00:00Z",
                                    passportExpireDate: "2032-05-12T00:00:00Z",
                                    gender: "Female"
                                }
                            ]
                        }, null, 2)
                    },
                    {
                        title: "Create Companion", method: "POST", url: "/api/airline/companions",
                        desc: "Add a new travel companion profile.",
                        requestParams: null,
                        requestBody: JSON.stringify({
                            firstName: "Jane",
                            lastName: "Doe",
                            ageType: "Adult",
                            passportNumber: "P9988221",
                            nationality: "Egyptian",
                            profilePic: "https://example.com/pic.png",
                            passportImage: "https://example.com/passport.png",
                            dateOfBirth: "1996-08-20",
                            passportExpireDate: "2032-05-12",
                            gender: "Female"
                        }, null, 2),
                        response: JSON.stringify({
                            success: true,
                            message: "Companion added successfully."
                        }, null, 2)
                    },
                    {
                        title: "Delete Companion", method: "DELETE", url: "/api/airline/companions/{id}",
                        desc: "Delete a companion profile.",
                        requestParams: [
                            { name: "id", type: "Path", desc: "Companion record ID" }
                        ],
                        requestBody: null,
                        response: JSON.stringify({
                            success: true,
                            message: "Companion deleted successfully."
                        }, null, 2)
                    }
                ]
            },
            {
                category: "5. Checkout Cart APIs",
                endpoints: [
                    {
                        title: "Get Pending Items", method: "GET", url: "/api/checkout/pending",
                        desc: "Fetch all unpaid, non-expired reservations owned by the logged-in user. Automatically filters out items belonging to other users.",
                        requestParams: [
                            { name: "userId", type: "Query (Legacy)", desc: "User ID. Note: The backend checks the authenticated JWT claims first." }
                        ],
                        requestBody: null,
                        response: JSON.stringify({
                            success: true,
                            message: "Pending bookings retrieved successfully.",
                            data: [
                                {
                                    id: 1045,
                                    referenceId: 1045,
                                    itemType: "AirlineBooking",
                                    displayName: "Flight MS101 (CAI -> DXB)",
                                    amount: 560.00,
                                    currency: "usd",
                                    createdAt: "2026-06-10T19:40:00Z",
                                    expiresAt: "2026-06-10T19:50:00Z",
                                    serverNowUtc: "2026-06-10T19:42:00Z",
                                    remainingSeconds: 480.0,
                                    paymentStatus: "Pending",
                                    status: "Pending",
                                    requiresPassengerDetails: true,
                                    passengerDetailsStatus: "Complete",
                                    isReadyForPayment: true,
                                    readinessMessage: "Ready for payment."
                                },
                                {
                                    id: 1046,
                                    referenceId: 1046,
                                    itemType: "AirlineBooking",
                                    displayName: "Flight MS777 (CAI -> FRA)",
                                    amount: 600.00,
                                    currency: "usd",
                                    createdAt: "2026-06-10T19:41:00Z",
                                    expiresAt: "2026-06-10T19:51:00Z",
                                    serverNowUtc: "2026-06-10T19:42:00Z",
                                    remainingSeconds: 540.0,
                                    paymentStatus: "Pending",
                                    status: "Pending",
                                    requiresPassengerDetails: true,
                                    passengerDetailsStatus: "Incomplete",
                                    isReadyForPayment: false,
                                    readinessMessage: "Complete passenger/passport details before payment."
                                },
                                {
                                    id: 88,
                                    referenceId: 88,
                                    itemType: "HotelBooking",
                                    displayName: "Hotel: Pyramids View Resort",
                                    amount: 480.00,
                                    currency: "usd",
                                    createdAt: "2026-06-10T19:40:00Z",
                                    expiresAt: "2026-06-10T20:40:00Z",
                                    serverNowUtc: "2026-06-10T19:42:00Z",
                                    remainingSeconds: 3480.0,
                                    paymentStatus: "Pending",
                                    status: "Pending",
                                    requiresPassengerDetails: false,
                                    passengerDetailsStatus: "Complete",
                                    isReadyForPayment: true,
                                    readinessMessage: "Ready for payment."
                                },
                                {
                                    id: 76,
                                    referenceId: 76,
                                    itemType: "TourBooking",
                                    displayName: "Tour: Historic Cairo Sites",
                                    amount: 120.00,
                                    currency: "usd",
                                    createdAt: "2026-06-10T19:40:00Z",
                                    expiresAt: "2026-06-10T20:40:00Z",
                                    serverNowUtc: "2026-06-10T19:42:00Z",
                                    remainingSeconds: 3480.0,
                                    paymentStatus: "Pending",
                                    status: "Pending",
                                    requiresPassengerDetails: false,
                                    passengerDetailsStatus: "Complete",
                                    isReadyForPayment: true,
                                    readinessMessage: "Ready for payment."
                                }
                            ]
                        }, null, 2),
                        notes: `
                            <h3>Client Selection Constraints</h3>
                            <ul>
                                <li><strong>Selectable Items</strong>: Only items with <code>isReadyForPayment = true</code> can be checked for payment.</li>
                                <li><strong>Disabled Items</strong>: If <code>isReadyForPayment = false</code>, the UI checkbox must be disabled. Direct the user to the passenger form modal.</li>
                            </ul>
                        `
                    },
                    {
                        title: "Create Checkout Session", method: "POST", url: "/api/checkout/create",

DateTime adjustedNow = DateTime.now().toUtc().add(clockOffset);

int remainingSeconds = itemRemaining.inSeconds;</code></pre>

                            <p>Use a periodic timer to update the remaining time displayed in the UI once per second:</p>
                            <pre><code>Timer? _timer;
Duration _offset = Duration.zero;

void initializeServerTimer(DateTime serverNow) {
  _offset = serverNow.difference(DateTime.now().toUtc());
  _timer = Timer.periodic(Duration(seconds: 1), (timer) {
    updateTimers();
  });
}

void updateTimers() {
  final adjustedNow = DateTime.now().toUtc().add(_offset);
  setState(() {
    for (var item in pendingItems) {
      item.remainingSeconds = item.expiresAt.difference(adjustedNow).inSeconds;
      if (item.remainingSeconds <= 0) {
        handleExpiredItem(item);
      }
    }
    
    // Update group timer if items are selected
    if (selectedItems.isNotEmpty) {
      final minExpiresAt = selectedItems.map((e) => e.expiresAt).reduce((a, b) => a.isBefore(b) ? a : b);
      groupRemainingSeconds = minExpiresAt.difference(adjustedNow).inSeconds;
      if (groupRemainingSeconds <= 0) {
        disablePayButton();
        refreshCart();
      }
    }
  });

  initialUrlRequest: URLRequest(url: WebUri(checkoutUrl)),
  onNavigationResponse: (controller, navigationResponse) async {

    if (url.contains("checkout-success.html")) {
      // 1. Intercept the redirect and extract the session_id
      final uri = Uri.parse(url);
      final sessionId = uri.queryParameters['session_id'];

      // 3. Navigate the user to the success screen

        // --- Render Sidebar ---
        function renderSidebar(filterQuery = "") {
            const sidebarList = document.getElementById('sidebarList');
            let html = '';
            const query = filterQuery.toLowerCase().trim();

            apiData.forEach((cat, catIdx) => {
                // Filter endpoints
                const filteredEndpoints = cat.endpoints.filter(ep => {
                    return ep.title.toLowerCase().includes(query) || 
                           ep.url.toLowerCase().includes(query) || 
                           ep.desc.toLowerCase().includes(query);
                });

                if (filteredEndpoints.length > 0) {
                    html += `<div class="category-title">${cat.category}</div>`;
                    filteredEndpoints.forEach((ep) => {
                        // Find index of ep in original cat array
                        const originalEpIdx = cat.endpoints.indexOf(ep);
                        html += `
                            <div class="endpoint-link" onclick="showDetails(${catIdx}, ${originalEpIdx}, this)">
                                <span class="method-badge method-${ep.method}">${ep.method}</span>
                                <span style="font-size: 0.85rem;">${ep.title}</span>
                            </div>
                        `;
                    });
                }
            });

            sidebarList.innerHTML = html || `<div style="padding: 24px; color: var(--text-muted); font-size: 0.9rem; text-align: center;">No matches found</div>`;
        }

        function filterSidebar() {
            const query = document.getElementById('searchSidebar').value;
            renderSidebar(query);
        }

        // --- Show Details ---
        function showDetails(catIdx, epIdx, el) {
            document.querySelectorAll('.endpoint-link').forEach(link => link.classList.remove('active'));
            if(el) el.classList.add('active');

            const ep = apiData[catIdx].endpoints[epIdx];
            const content = document.getElementById('mainContent');

            if (ep.isGuide) {
