<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Playground - Travai</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.04);
            --primary: #6366f1;
            --primary-light: #818cf8;
            --accent: #10b981;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 5%;
            background-image: 
                radial-gradient(circle at 5% 5%, rgba(99, 102, 241, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 95% 95%, rgba(139, 92, 246, 0.12) 0%, transparent 40%);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .btn-back:hover {
            color: var(--primary-light);
        }

        /* User Identity Panel */
        .identity-panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            align-items: flex-end;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
        }

        input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            color: white;
            font-size: 1rem;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary-light);
        }

        .btn {
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #4f46e5;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-success {
            background: var(--accent);
            color: white;
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.2);
        }

        .btn-success:hover:not(:disabled) {
            background: #059669;
            transform: translateY(-1px);
        }

        .btn-success:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Booking Sections */
        .section-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .section-header {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        /* Lists and Tables */
        .item-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .item-row {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.2s;
        }

        .item-row:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .item-row.selectable {
            cursor: pointer;
        }

        .item-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .checkbox-container {
            position: relative;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .checkbox-container input {
            display: none;
        }

        .checkmark {
            width: 22px;
            height: 22px;
            border: 2px solid var(--border);
            border-radius: 6px;
            display: inline-block;
            position: relative;
            transition: all 0.2s;
        }

        .checkbox-container input:checked + .checkmark {
            background: var(--primary);
            border-color: var(--primary);
        }

        .checkbox-container input:checked + .checkmark::after {
            content: '';
            position: absolute;
            left: 7px;
            top: 3px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .item-details {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .item-title {
            font-weight: 600;
            font-size: 1.05rem;
        }

        .item-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            gap: 15px;
        }

        .item-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .price-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .empty-state i {
            font-size: 2rem;
            margin-bottom: 10px;
            opacity: 0.3;
            display: block;
        }

        /* Combined Actions */
        .cart-sticky-bar {
            position: sticky;
            bottom: 20px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--primary);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
            z-index: 100;
            margin-top: 40px;
        }

        .cart-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .cart-total-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .cart-total-amount {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        /* Spinner overlays */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.75);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .spinner-large {
            width: 60px;
            height: 60px;
            border: 5px solid var(--border);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>

    <div class="overlay" id="loadingOverlay">
        <div class="spinner-large"></div>
    </div>

    <div class="container">
        <header>
            <div>
                <a href="checkout.html" class="btn-back">
                    <i class="fas fa-arrow-left"></i> Back to Checkout Summary
                </a>
                <h1 style="margin-top: 10px;">Checkout Playbook Console</h1>
            </div>
        </header>

        <!-- User Identity Setup -->
        <div class="identity-panel">
            <div class="input-group">
                <label for="userIdInput">Active Demo User ID</label>
                <input type="number" id="userIdInput" placeholder="Enter User ID">
            </div>
            <button class="btn btn-primary" onclick="loadPendingBookings()">
                <i class="fas fa-sync"></i> Load Bookings
            </button>
        </div>

        <!-- Section 1: Airline Bookings (Paid Alone) -->
        <div class="section-box">
            <div class="section-header">
                <i class="fas fa-plane" style="color: var(--primary-light)"></i> Airline Flights (Separately Paid)
            </div>
            <div id="airlineList" class="item-list">
                <div class="empty-state">
                    <i class="fas fa-plane"></i> Enter User ID and click Load Bookings
                </div>
            </div>
        </div>

        <!-- Section 2: Hotel & Tour Bookings (Can be combined) -->
        <div class="section-box">
            <div class="section-header">
                <i class="fas fa-box" style="color: var(--primary-light)"></i> Hotel & Tour Bookings (Can combine in Cart)
            </div>
            
            <h3 style="font-size: 1rem; color: var(--text-muted); margin-bottom: 15px; font-weight: 500;">🏨 Unpaid Stays</h3>
            <div id="hotelList" class="item-list" style="margin-bottom: 30px;">
                <div class="empty-state"><p>No stays loaded yet.</p></div>
            </div>

            <h3 style="font-size: 1rem; color: var(--text-muted); margin-bottom: 15px; font-weight: 500;">🗺️ Unpaid Tours</h3>
            <div id="tourList" class="item-list">
                <div class="empty-state"><p>No tours loaded yet.</p></div>
            </div>
        </div>

        <!-- Sticky Cart Panel for Combined Hotel/Tours -->
        <div class="cart-sticky-bar" id="cartBar">
            <div class="cart-info">
                <div class="cart-total-label" id="cartSummaryText">0 Items Selected</div>
                <div class="cart-total-amount" id="cartTotalText">$0.00</div>
            </div>
            <button class="btn btn-success" id="payCombinedBtn" onclick="checkoutCombinedHotelTour()" disabled>
                <i class="fas fa-credit-card"></i> Pay Selected Hotel + Tour
            </button>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'auth/login.html';
        }

        // Initialize User ID
        let userId = null;
        try {
            const userValuesStr = localStorage.getItem('userValues');
            if (userValuesStr) {
                const userValues = JSON.parse(userValuesStr);
                userId = userValues.id || userValues.Id;
            }
        } catch (e) {
            console.error(e);
        }
        if (!userId) userId = localStorage.getItem('userId');
        if (!userId) userId = 7; // demo default

        document.getElementById('userIdInput').value = userId;

        let selectedHotels = new Set();
        let selectedTours = new Set();
        let hotelsData = [];
        let toursData = [];

        async function loadPendingBookings() {
            const activeUserId = document.getElementById('userIdInput').value;
            if (!activeUserId) {
                alert('Please enter a User ID.');
                return;
            }

            showLoader();
            selectedHotels.clear();
            selectedTours.clear();
            updateCartSummary();

            try {
                const response = await fetch(`/api/checkout/pending?userId=${activeUserId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const result = await response.json();
                hideLoader();

                if (result.success && result.data) {
                    const items = result.data;
                    renderBookings(items);
                } else {
                    alert(result.message || 'Failed to retrieve bookings.');
                }
            } catch (err) {
                hideLoader();
                alert('Network connection error.');
            }
        }

        let countdownInterval = null;

        function startCountdownTimer() {
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                const now = Date.now();
                let anyExpired = false;
                
                document.querySelectorAll('.timer-countdown').forEach(el => {
                    const targetTime = parseInt(el.getAttribute('data-target-time'));
                    const id = el.getAttribute('data-id');
                    const type = el.getAttribute('data-type');
                    
                    const remainingMs = targetTime - now;
                    
                    if (remainingMs <= 0) {
                        el.innerText = "Expired";
                        el.style.color = "var(--danger)";
                        
                        // Disable checkbox/pay button
                        if (type === 'flight') {
                            const btn = el.closest('.item-row').querySelector('button');
                            if (btn) btn.disabled = true;
                        } else {
                            const chk = document.getElementById(`${type}-check-${id}`);
                            if (chk) {
                                chk.disabled = true;
                                chk.checked = false;
                            }
                        }
                        
                        if (!el.classList.contains('is-expired')) {
                            el.classList.add('is-expired');
                            anyExpired = true;
                        }
                    } else {
                        const totalSecs = Math.floor(remainingMs / 1000);
                        const mins = Math.floor(totalSecs / 60);
                        const secs = totalSecs % 60;
                        const formattedMins = mins.toString().padStart(2, '0');
                        const formattedSecs = secs.toString().padStart(2, '0');
                        el.innerText = `Time left: ${formattedMins}:${formattedSecs}`;
                    }
                });

                if (anyExpired) {
                    clearInterval(countdownInterval);
                    setTimeout(() => {
                        loadPendingBookings();
                    }, 2000);
                }
            }, 1000);
        }

        function renderBookings(items) {
            const airlineList = document.getElementById('airlineList');
            const hotelList = document.getElementById('hotelList');
            const tourList = document.getElementById('tourList');

            // Reset arrays
            hotelsData = [];
            toursData = [];

            const flights = items.filter(i => i.itemType === 'AirlineBooking');
            const hotels = items.filter(i => i.itemType === 'HotelBooking');
            const tours = items.filter(i => i.itemType === 'TourBooking');

            // Render Flights
            if (flights.length > 0) {
                airlineList.innerHTML = flights.map(f => `
                    <div class="item-row">
                        <div class="item-left">
                            <div class="item-details">
                                <div class="item-title">${f.displayName}</div>
                                <div class="item-meta">
                                    <span><i class="far fa-calendar"></i> Booked: ${formatDateTime(f.createdAt)}</span>
                                    <span><i class="far fa-hourglass" style="color: var(--danger)"></i> <span class="timer-countdown" data-target-time="${Date.now() + (f.remainingSeconds * 1000)}" data-id="${f.id}" data-type="flight">Time left: --:--</span></span>
                                </div>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <div class="price-badge">$${f.amount.toFixed(2)}</div>
                            <button class="btn btn-secondary" onclick="checkoutAirline(${f.id})">Pay Flight</button>
                        </div>
                    </div>
                `).join('');
            } else {
                airlineList.innerHTML = `<div class="empty-state"><i class="fas fa-plane"></i>No unpaid/non-expired flights found.</div>`;
            }

            // Render Hotels
            if (hotels.length > 0) {
                hotelsData = hotels;
                hotelList.innerHTML = hotels.map(h => `
                    <div class="item-row selectable" onclick="toggleSelection('hotel', ${h.id})">
                        <div class="item-left">
                            <label class="checkbox-container" onclick="event.stopPropagation()">
                                <input type="checkbox" id="hotel-check-${h.id}" onchange="toggleSelection('hotel', ${h.id})">
                                <span class="checkmark"></span>
                            </label>
                            <div class="item-details">
                                <div class="item-title">${h.displayName}</div>
                                <div class="item-meta">
                                    <span><i class="far fa-calendar"></i> Created: ${formatDateTime(h.createdAt)}</span>
                                    <span><i class="far fa-hourglass"></i> <span class="timer-countdown" data-target-time="${Date.now() + (h.remainingSeconds * 1000)}" data-id="${h.id}" data-type="hotel">Time left: --:--</span></span>
                                </div>
                            </div>
                        </div>
                        <div class="price-badge">$${h.amount.toFixed(2)}</div>
                    </div>
                `).join('');
            } else {
                hotelList.innerHTML = `<div class="empty-state">No unpaid/non-expired stays found.</div>`;
            }

            // Render Tours
            if (tours.length > 0) {
                toursData = tours;
                tourList.innerHTML = tours.map(t => `
                    <div class="item-row selectable" onclick="toggleSelection('tour', ${t.id})">
                        <div class="item-left">
                            <label class="checkbox-container" onclick="event.stopPropagation()">
                                <input type="checkbox" id="tour-check-${t.id}" onchange="toggleSelection('tour', ${t.id})">
                                <span class="checkmark"></span>
                            </label>
                            <div class="item-details">
                                <div class="item-title">${t.displayName}</div>
                                <div class="item-meta">
                                    <span><i class="far fa-calendar"></i> Created: ${formatDateTime(t.createdAt)}</span>
                                    <span><i class="far fa-hourglass"></i> <span class="timer-countdown" data-target-time="${Date.now() + (t.remainingSeconds * 1000)}" data-id="${t.id}" data-type="tour">Time left: --:--</span></span>
                                </div>
                            </div>
                        </div>
                        <div class="price-badge">${t.currency.toUpperCase()} $${t.amount.toFixed(2)}</div>
                    </div>
                `).join('');
            } else {
                tourList.innerHTML = `<div class="empty-state">No unpaid/non-expired tours found.</div>`;
            }

            startCountdownTimer();
        }

        function toggleSelection(type, id) {
            const set = type === 'hotel' ? selectedHotels : selectedTours;
            const checkbox = document.getElementById(`${type}-check-${id}`);

            if (set.has(id)) {
                set.delete(id);
                if (checkbox) checkbox.checked = false;
            } else {
                set.add(id);
                if (checkbox) checkbox.checked = true;
            }

            updateCartSummary();
        }

        function updateCartSummary() {
            let total = 0;
            let count = selectedHotels.size + selectedTours.size;

            selectedHotels.forEach(id => {
                const hObj = hotelsData.find(x => x.id === id);
                if (hObj) total += hObj.amount;
            });

            selectedTours.forEach(id => {
                const tObj = toursData.find(x => x.id === id);
                if (tObj) total += tObj.amount;
            });

            document.getElementById('cartSummaryText').innerText = `${count} Booking(s) Selected`;
            document.getElementById('cartTotalText').innerText = `$${total.toFixed(2)}`;
            document.getElementById('payCombinedBtn').disabled = count === 0;
        }

        async function checkoutAirline(bookingId) {
            const activeUserId = parseInt(document.getElementById('userIdInput').value);
            showLoader();

            try {
                const response = await fetch('/api/checkout/airline', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ userId: activeUserId, airlineBookingId: bookingId })
                });

                const result = await response.json();
                hideLoader();

                if (result.success && result.data && result.data.checkoutUrl) {
                    window.location.href = result.data.checkoutUrl;
                } else {
                    alert(result.message || 'Payment initiation failed.');
                }
            } catch (err) {
                hideLoader();
                alert('Network connection error.');
            }
        }

        async function checkoutCombinedHotelTour() {
            const activeUserId = parseInt(document.getElementById('userIdInput').value);
            
            const hotelIds = Array.from(selectedHotels);
            const tourIds = Array.from(selectedTours);

            showLoader();

            try {
                const response = await fetch('/api/checkout/hotel-tour', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        userId: activeUserId,
                        hotelBookingIds: hotelIds,
                        tourBookingIds: tourIds
                    })
                });

                const result = await response.json();
                hideLoader();

                if (result.success && result.data && result.data.checkoutUrl) {
                    window.location.href = result.data.checkoutUrl;
                } else {
                    alert(result.message || 'Payment initiation failed.');
                }
            } catch (err) {
                hideLoader();
                alert('Network connection error.');
            }
        }

        function formatDateTime(str) {
            if (!str) return 'TBD';
            return new Date(str).toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function showLoader() {
            document.getElementById('loadingOverlay').style.display = 'flex';
        }

        function hideLoader() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // Auto load on init
        window.onload = loadPendingBookings;
    </script>
</body>
</html>
