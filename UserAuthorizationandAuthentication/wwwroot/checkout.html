<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Travai Unified</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --primary: #6366f1;
            --primary-light: #818cf8;
            --accent: #10b981;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(139, 92, 246, 0.15) 0%, transparent 40%);
        }

        /* Navbar */
        nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { 
            font-size: 1.5rem; 
            font-weight: 700; 
            color: var(--primary-light); 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }

        .container {
            flex-grow: 1;
            width: 100%;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .checkout-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 40px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out;
        }

        .checkout-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(to right, var(--primary), #c084fc);
        }

        .icon-header {
            font-size: 3.5rem;
            color: var(--primary-light);
            margin-bottom: 15px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 35px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 35px;
            width: 100%;
        }

        .summary-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s;
        }

        .summary-item:hover {
            border-color: var(--primary-light);
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-2px);
        }

        .item-icon {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .item-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: 500;
        }

        .item-count {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
        }

        .total-box {
            background: rgba(99, 102, 241, 0.08);
            border: 1px dashed rgba(99, 102, 241, 0.3);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .total-label {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .total-amount {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .actions-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.25);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(99, 102, 241, 0.35);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .test-link {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-decoration: none;
            margin-top: 20px;
            transition: color 0.2s;
            display: inline-block;
        }

        .test-link:hover {
            color: var(--primary-light);
            text-decoration: underline;
        }

        /* Loading / Empty States */
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--glass-border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        @media (max-width: 650px) {
            .summary-grid {
                grid-template-columns: 1fr;
            }
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .item-row {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .item-row:hover {
            border-color: var(--primary-light);
            background: rgba(255, 255, 255, 0.04);
        }

        .item-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
            text-align: left;
        }

        .item-title {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text);
        }

        .item-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            gap: 12px;
        }

        .item-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .price-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 4px 8px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">
            <i class="fas fa-route"></i> Travai Unified
        </a>
    </nav>

    <div class="container">
        <div class="checkout-card" id="mainCard">
            <div id="loader" class="spinner"></div>

            <div id="content" style="display: none;">
                <div class="icon-header">💳</div>
                <h1>Your Checkout Summary</h1>
                <p class="subtitle">Review your active pending bookings across flights, hotels, and tours.</p>

                <div class="summary-grid">
                    <div class="summary-item">
                        <div class="item-icon">✈️</div>
                        <div class="item-label">Flights</div>
                        <div class="item-count" id="airlineCount">0</div>
                    </div>
                    <div class="summary-item">
                        <div class="item-icon">🏨</div>
                        <div class="item-label">Hotels</div>
                        <div class="item-count" id="hotelCount">0</div>
                    </div>
                    <div class="summary-item">
                        <div class="item-icon">🗺️</div>
                        <div class="item-label">Tours</div>
                        <div class="item-count" id="tourCount">0</div>
                    </div>
                </div>

                <div id="pendingItemsList" class="item-list" style="margin: 25px 0; text-align: left; width: 100%;">
                    <!-- Pending items with timers will be rendered here -->
                </div>

                <div class="total-box">
                    <div class="total-label">
                        <i class="fas fa-wallet" style="color: var(--primary-light)"></i> Total Outstanding Amount
                    </div>
                    <div class="total-amount" id="totalAmount">$0.00</div>
                </div>

                <div class="actions-box">
                    <a href="checkout-test.html" class="btn btn-primary" id="payBtn">
                        <i class="fas fa-credit-card"></i> Go To Payment
                    </a>
                    <a href="my-trips.html" class="btn btn-secondary">
                        <i class="fas fa-suitcase"></i> View Pending Bookings
                    </a>
                </div>

                <a href="checkout-test.html" class="test-link">
                    <i class="fas fa-flask"></i> Open Advanced Checkout Test Console
                </a>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'auth/login.html';
        }

        // Parse user identity safely
        let userId = null;
        try {
            const userValuesStr = localStorage.getItem('userValues');
            if (userValuesStr) {
                const userValues = JSON.parse(userValuesStr);
                userId = userValues.id || userValues.Id;
            }
        } catch (e) {
            console.error(e);
        }
        if (!userId) userId = localStorage.getItem('userId');
        if (!userId) userId = 7; // demo fallback

        let countdownInterval = null;

        function startCountdownTimer() {
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                const now = Date.now();
                let anyExpired = false;
                
                document.querySelectorAll('.timer-countdown').forEach(el => {
                    const targetTime = parseInt(el.getAttribute('data-target-time'));
                    
                    const remainingMs = targetTime - now;
                    
                    if (remainingMs <= 0) {
                        el.innerText = "Expired";
                        el.style.color = "var(--danger)";
                        
                        if (!el.classList.contains('is-expired')) {
                            el.classList.add('is-expired');
                            anyExpired = true;
                        }
                    } else {
                        const totalSecs = Math.floor(remainingMs / 1000);
                        const mins = Math.floor(totalSecs / 60);
                        const secs = totalSecs % 60;
                        const formattedMins = mins.toString().padStart(2, '0');
                        const formattedSecs = secs.toString().padStart(2, '0');
                        el.innerText = `Time left: ${formattedMins}:${formattedSecs}`;
                    }
                });

                if (anyExpired) {
                    clearInterval(countdownInterval);
                    setTimeout(() => {
                        loadSummary();
                    }, 2000);
                }
            }, 1000);
        }

        async function loadSummary() {
            try {
                const response = await fetch(`/api/checkout/pending?userId=${userId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const result = await response.json();
                
                if (result.success && result.data) {
                    const items = result.data;
                    
                    let airlineCount = 0;
                    let hotelCount = 0;
                    let tourCount = 0;
                    let totalSum = 0;
                    let listHtml = '';

                    items.forEach(item => {
                        totalSum += item.amount;
                        if (item.itemType === 'AirlineBooking') {
                            airlineCount++;
                        } else if (item.itemType === 'HotelBooking') {
                            hotelCount++;
                        } else if (item.itemType === 'TourBooking') {
                            tourCount++;
                        }

                        const badgeClass = item.itemType === 'AirlineBooking' ? 'fa-plane' : (item.itemType === 'HotelBooking' ? 'fa-hotel' : 'fa-route');
                        listHtml += `
                            <div class="item-row">
                                <div class="item-details">
                                    <div class="item-title"><i class="fas ${badgeClass}" style="color: var(--primary-light); margin-right: 8px;"></i>${item.displayName}</div>
                                    <div class="item-meta">
                                        <span><i class="far fa-hourglass"></i> <span class="timer-countdown" data-target-time="${Date.now() + (item.remainingSeconds * 1000)}" data-id="${item.id}" data-type="${item.itemType}">Time left: --:--</span></span>
                                    </div>
                                </div>
                                <div class="price-badge">$${item.amount.toFixed(2)}</div>
                            </div>
                        `;
                    });

                    document.getElementById('airlineCount').innerText = airlineCount;
                    document.getElementById('hotelCount').innerText = hotelCount;
                    document.getElementById('tourCount').innerText = tourCount;
                    document.getElementById('totalAmount').innerText = `$${totalSum.toFixed(2)}`;
                    document.getElementById('pendingItemsList').innerHTML = listHtml || '<div class="subtitle" style="text-align: center; width: 100%;">No pending bookings.</div>';

                    if (totalSum === 0) {
                        document.getElementById('payBtn').style.pointerEvents = 'none';
                        document.getElementById('payBtn').style.opacity = '0.5';
                        document.getElementById('payBtn').innerHTML = '<i class="fas fa-check-circle"></i> No Payments Due';
                    } else {
                        document.getElementById('payBtn').style.pointerEvents = 'auto';
                        document.getElementById('payBtn').style.opacity = '1';
                        document.getElementById('payBtn').innerHTML = '<i class="fas fa-credit-card"></i> Go To Payment';
                    }

                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                    startCountdownTimer();
                } else {
                    showError(result.message || 'Failed to load booking summary.');
                }
            } catch (err) {
                showError('Error communicating with checkout services.');
            }
        }

        function showError(msg) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('mainCard').innerHTML = `
                <div class="icon-header" style="color: #ef4444;">⚠️</div>
                <h1 style="color: #ef4444;">Service Error</h1>
                <p class="subtitle" style="margin-bottom: 20px;">${msg}</p>
                <a href="index.html" class="btn btn-secondary">Back to Dashboard</a>
            `;
        }

        window.onload = loadSummary;
    </script>
</body>
</html>
