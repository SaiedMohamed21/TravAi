<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payout Fine Details - TravAi</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin-payout.css">
</head>
<body>
    <div class="max-width-container" style="max-width: 800px; margin: 40px auto; font-family: 'Outfit', sans-serif;">
        <a href="#" id="back-link" class="back-link" style="text-decoration: none; color: var(--primary); font-weight: 500; margin-bottom: 20px; display: inline-block;">
            <i class="fa-solid fa-arrow-left"></i> Back to Payout Details
        </a>

        <div class="content-card" style="background: white; border-radius: 12px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <div style="border-bottom: 1px solid #eee; padding-bottom: 16px; margin-bottom: 24px;">
                <h1 style="font-size: 1.5rem; color: #1e293b; margin: 0;">Fine Details</h1>
            </div>

            <table class="info-table" id="fine-details-table" style="width: 100%; border-collapse: collapse;">
                <!-- Filled dynamically -->
                <tr><td colspan="2" style="text-align: center;"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</td></tr>
            </table>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="js/admin-payout-fine-details.js"></script>
</body>
</html>
