<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Success - Travai</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --primary: #6366f1;
            --accent: #10b981;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(16, 185, 129, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(99, 102, 241, 0.12) 0%, transparent 40%);
            padding: 20px;
        }

        .success-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.4);
            animation: scaleUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .details-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: var(--text-muted);
        }

        .detail-value {
            font-weight: 600;
        }

        .amount-highlight {
            color: var(--accent);
            font-weight: 700;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            text-decoration: none;
            background: var(--primary);
            color: white;
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3);
        }

        .btn:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }

        /* Loading Spinner */
        .spinner {
            width: 45px;
            height: 45px;
            border: 3px solid var(--glass-border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes scaleUp {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div id="loader">
            <div class="spinner"></div>
            <h2 style="margin-top: 15px;">Confirming Payment...</h2>
            <p class="subtitle">Verifying your transaction with Stripe services</p>
        </div>

        <div id="successContent" style="display: none;">
            <div class="icon-box">
                <i class="fas fa-check"></i>
            </div>
            <h1>Booking Paid!</h1>
            <p class="subtitle">Thank you. Your reservation is now fully confirmed.</p>

            <div class="details-box">
                <div class="detail-row">
                    <span class="detail-label">Checkout Session ID</span>
                    <span class="detail-value" id="sessionId">#0</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Transaction Reference</span>
                    <span class="detail-value" id="txId">Pending</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Amount Paid</span>
                    <span class="detail-value amount-highlight" id="amountPaid">$0.00</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Payment Status</span>
                    <span class="detail-value" style="color: var(--accent)" id="paymentStatus">Paid</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Paid At</span>
                    <span class="detail-value" id="paidAt">-</span>
                </div>
            </div>

            <a href="checkout.html" class="btn">
                <i class="fas fa-arrow-left"></i> Back to Checkout
            </a>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');

        async function confirmPayment() {
            const params = new URLSearchParams(window.location.search);
            const stripeSessionId = params.get('session_id');

            if (!stripeSessionId) {
                showError('Missing session_id parameters in URL.');
                return;
            }

            try {
                // Call checkout confirm endpoint which updates database directly
                const response = await fetch(`/api/checkout/confirm?session_id=${stripeSessionId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const result = await response.json();

                if (result.success) {
                    document.getElementById('sessionId').innerText = `#${result.checkoutSessionId}`;
                    document.getElementById('txId').innerText = result.paymentTransactionId || 'Stripe PI';
                    document.getElementById('amountPaid').innerText = `$${result.amount.toFixed(2)}`;
                    document.getElementById('paymentStatus').innerText = result.status || 'Paid';
                    document.getElementById('paidAt').innerText = result.paidAt ? new Date(result.paidAt).toLocaleString() : new Date().toLocaleString();

                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('successContent').style.display = 'block';
                } else {
                    showError(result.message || 'Payment confirmation failed.');
                }
            } catch (err) {
                showError('Error communicating with payment verification service.');
            }
        }

        function showError(msg) {
            document.getElementById('loader').style.display = 'none';
            document.querySelector('.success-card').innerHTML = `
                <div class="icon-box" style="background: rgba(239, 68, 68, 0.15); color: #ef4444; border-color: rgba(239, 68, 68, 0.3);">
                    <i class="fas fa-times"></i>
                </div>
                <h1 style="color: #ef4444;">Confirmation Error</h1>
                <p class="subtitle">${msg}</p>
                <a href="checkout.html" class="btn" style="background: var(--glass-border); color: white; box-shadow: none;">
                    Back to Checkout
                </a>
            `;
        }

        window.onload = confirmPayment;
    </script>
</body>
</html>
